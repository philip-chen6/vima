name: MCP tests

on:
  push:
    branches: [main]
    paths:
      - 'packages/vima-mcp/**'
      - 'infra/Dockerfile.mcp'
      - 'infra/docker-compose.yml'
      - 'infra/Caddyfile'
      - '.github/workflows/mcp-tests.yml'
  pull_request:
    paths:
      - 'packages/vima-mcp/**'
      - 'infra/Dockerfile.mcp'
      - 'infra/docker-compose.yml'
      - 'infra/Caddyfile'
      - '.github/workflows/mcp-tests.yml'
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/vima-mcp
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest

      - name: Run pytest
        run: pytest -q

  infra-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker compose config
        run: docker compose -f infra/docker-compose.yml config --quiet

      - name: Validate Caddyfile
        run: |
          docker run --rm \
            -v "$PWD/infra/Caddyfile:/etc/caddy/Caddyfile:ro" \
            caddy:2-alpine \
            caddy validate --config /etc/caddy/Caddyfile
