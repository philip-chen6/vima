name: Deploy to Vultr

on:
  push:
    branches: [main]
  workflow_dispatch:

# Concurrency lock — only one deploy at a time. If a new push lands while
# a deploy is running, queue the new one (don't cancel the running one,
# since killing a deploy mid-rsync or mid-build can leave the box in a
# half-applied state). With cancel-in-progress: false the queue depth is
# capped at the in-progress run + the latest queued; intermediate pushes
# get superseded automatically by GitHub.
concurrency:
  group: deploy-vultr
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Rsync to box
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            --exclude node_modules \
            --exclude .next \
            --exclude .venv \
            --exclude __pycache__ \
            --exclude .git \
            --exclude .gstack \
            --exclude '/paper' \
            --exclude '/proof' \
            --exclude '/demo' \
            --exclude '*.pyc' \
            --exclude '.DS_Store' \
            --exclude '.env' \
            ./ root@${{ secrets.DEPLOY_HOST }}:/opt/vima/

      - name: Build and restart on box
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.DEPLOY_HOST }} 'bash -s' <<'EOF'
            set -e
            cd /opt/vima/infra

            # Stale-state cleanup: if a previous deploy crashed mid-recreate,
            # docker leaves containers "marked for removal" which blocks the
            # next compose up with: "container is marked for removal and
            # cannot be started". Force-remove any leftover containers from
            # the compose project before bringing things back up. This is
            # safe because compose recreates them anyway.
            for c in infra-frontend-1 infra-backend-1 infra-mcp-1 infra-caddy-1; do
              if docker inspect "$c" >/dev/null 2>&1; then
                state=$(docker inspect -f '{{.State.Status}}' "$c" 2>/dev/null || echo "unknown")
                if [ "$state" = "removing" ] || [ "$state" = "dead" ] || [ "$state" = "created" ]; then
                  echo "[cleanup] removing stuck container: $c (state=$state)"
                  docker rm -f "$c" 2>/dev/null || true
                fi
              fi
            done

            docker compose --env-file ../.env build --parallel
            docker compose --env-file ../.env up -d --remove-orphans

            echo "waiting for backend..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8765/health > /dev/null 2>&1; then
                echo "backend healthy"
                break
              fi
              sleep 2
              if [ "$i" = "30" ]; then
                echo "ERROR: backend health failed after 30 tries"
                docker compose --env-file ../.env logs --tail 50 backend
                exit 1
              fi
            done

            echo "waiting for mcp..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8766/health > /dev/null 2>&1; then
                echo "mcp healthy"
                break
              fi
              sleep 2
              if [ "$i" = "30" ]; then
                echo "ERROR: mcp health failed after 30 tries"
                docker compose --env-file ../.env logs --tail 50 mcp
                exit 1
              fi
            done

            # Health gate: prod must serve 200. Try 5x with backoff before
            # giving up. Logs failures loudly so the workflow run shows red.
            echo "verifying public health..."
            for i in $(seq 1 5); do
              root_code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:80/ || echo 000)
              mcp_code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:80/mcp/health || echo 000)
              if [ "$root_code" = "200" ] && [ "$mcp_code" = "200" ]; then
                echo "public health ok (root=$root_code mcp=$mcp_code)"
                break
              fi
              echo "[$i/5] public returned root=$root_code mcp=$mcp_code, retrying..."
              sleep 4
              if [ "$i" = "5" ]; then
                echo "ERROR: public health failed after 5 tries (root=$root_code mcp=$mcp_code)"
                docker compose --env-file ../.env ps
                docker compose --env-file ../.env logs --tail 50 frontend
                docker compose --env-file ../.env logs --tail 50 mcp
                docker compose --env-file ../.env logs --tail 50 caddy
                exit 1
              fi
            done

            # Cleanup should never hold the deploy open. Docker prune can hang
            # behind the daemon lock on the small VPS, so cap it and keep the
            # already-healthy deployment green.
            timeout 45s docker system prune -af 2>/dev/null || true
            timeout 45s docker builder prune -af 2>/dev/null || true
          EOF
