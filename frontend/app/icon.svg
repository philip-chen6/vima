<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="0" fill="#080503"/>
  <!-- outer hex: solid bright fill so it survives 16x16 / 32x32 -->
  <path
    d="M32 5 55 18.5v27L32 59 9 45.5v-27Z"
    fill="#f2a7b8"
  />
  <!-- inner hex: cut out the dark bg so the mark reads as a ring at small sizes -->
